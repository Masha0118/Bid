name: Deploy Flow Console

on:
  push:
    branches: [main]
    paths:
      - "flow-console/**"
      - ".github/workflows/deploy-flow-console.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flow-console/package-lock.json
      - name: Install
        working-directory: flow-console
        run: npm ci
      - name: Type check
        working-directory: flow-console
        run: npm run type-check
      - name: Test
        working-directory: flow-console
        run: npm run test
      - name: Build for project Pages
        working-directory: flow-console
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: flow-console/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
